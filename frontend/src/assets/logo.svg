<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44">
  <!-- Icon square -->
  <rect width="40" height="40" rx="9" fill="#1e6b2e" y="2"/>

  <!-- W shape -->
  <polyline points="7,12 13,30 20,18 27,30 33,12"
    fill="none" stroke="#f5a623" stroke-width="4"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sun arc -->
  <path d="M13,12 A10,10 0 0,1 27,12"
    fill="none" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sun dot -->
  <circle cx="20" cy="7" r="3.5" fill="#f5a623"/>

  <!-- Wordmark -->
  <text x="50" y="19"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="16" font-weight="600" fill="#1e6b2e" letter-spacing="-0.3">Green</text>
  <text x="98" y="19"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="16" font-weight="600" fill="#4caf50" letter-spacing="-0.3">Lens</text>

  <!-- Tagline -->
  <text x="50" y="33"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="9" fill="#888" letter-spacing="0.8">SOLAR INTELLIGENCE</text>
</svg>
